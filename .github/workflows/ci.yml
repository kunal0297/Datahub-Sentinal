# Lint + typecheck + unit tests on every push and PR. Hermetic: the unit
# suite runs entirely against FakeDataHubClient — no DataHub, no network.
# The full live-DataHub scenario runs in demo-self-check.yml.
name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check src tests seed
          ruff format --check src tests seed

      - name: Typecheck (mypy)
        run: python -m mypy src/sentinel

      - name: Unit tests
        run: python -m pytest tests/unit -v
