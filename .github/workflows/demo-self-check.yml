# The submission-quality proof: stands up real open-source DataHub via its
# own maintained quickstart, seeds the synthetic demo graph, and runs the
# end-to-end integration scenario (PR Impact incident, Migration Copilot
# lineage walk + deprecation, ML Blast Radius trace, Quality fail->heal->
# auto-resolve) against it. If this is green, "clone and run the demo"
# is continuously verified, not just asserted in the README.
#
# Heavy job (DataHub quickstart is a ~14-container stack), so it runs on
# pushes to the default/dev branches and on demand — not on every PR sync.
name: Demo self-check

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday sanity run so drift surfaces early

jobs:
  end-to-end:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Start DataHub OSS (docker quickstart)
        # the datahub CLI manages its own compose profile and waits for
        # health; see ARCHITECTURE.md for why we don't hand-roll compose.
        # Flag verified against the installed CLI's --help.
        run: datahub docker quickstart --dump-logs-on-failure
        timeout-minutes: 30

      - name: Verify DataHub is healthy
        run: datahub docker check

      - name: Seed + run the end-to-end scenario
        env:
          RUN_INTEGRATION_TESTS: "1"
          DATAHUB_GMS_URL: http://localhost:8080
        run: python -m pytest tests/integration -v

      - name: Dump container state on failure
        if: failure()
        run: |
          docker ps -a
          for c in $(docker ps -a --format '{{.Names}}' | grep -i gms); do
            docker logs "$c" --tail 200 || true
          done
